<script type="text/javascript">
(function () {
    'use strict';

    function htmlEscape(value) {
        return String(value === undefined || value === null ? '' : value).replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;').replace(/'/g, '&#39;');
    }
    function setButtonLoading(btn, isLoading) {
        if (isLoading) { btn._origText = btn.textContent; btn.textContent = btn._origText + '...'; btn.classList.add('is-loading'); btn.disabled = true; }
        else { btn.classList.remove('is-loading'); btn.disabled = false; if (btn._origText !== undefined) btn.textContent = btn._origText; }

    function requestPlugin(pluginName, functionName, args, callback, timeout) {
        if (!timeout) timeout = 3600 * 1000;
        $.ajax({ type: 'POST', url: '/plugin?action=a&s=' + functionName + '&name=' + pluginName, data: args, timeout: timeout, success: function (rdata) { if (callback) callback(rdata); }, error: function () { layer.msg('插件请求失败，请检查网络或面板状态', { icon: 2 }); } });
    }

        sites: [],
        filterText: '',
        filterStatus: 'all',

            { value: 'arithmetic',    title: '算术验证' },
            { value: 'pow_hash',      title: 'PoW / Hash' }
        ],

            $('.plugin_body').html('<div class="jsfw-loading"><div class="jsfw-spinner"></div>正在加载站点数据...</div>');
            requestPlugin('xcy_safe', 'get_sites', {}, function (rdata) {
                if (!rdata.status) { layer.msg(rdata.msg || '读取网站列表失败', { icon: 2 }); return; }
                self.sites = rdata.sites || [];
                self.challengeTypes = rdata.challenge_types || self.challengeTypes;
                self.selectedSites = {};
                self.renderSites();
            });
        },

        renderSites: function () {
            var stats = this.getStats(), list = '', visible = 0;
            for (var i = 0; i < this.sites.length; i++) {
                if (!this.matchFilter(this.sites[i])) continue;
                list += this.renderSiteItem(this.sites[i], i);
                visible++;
            }
            if (!list) list = '<div class="jsfw-empty"><div class="jsfw-empty-icon"></div>暂无匹配的网站</div>';
            var batchCount = Object.keys(this.selectedSites).length;
            var batchClass = batchCount > 0 ? ' visible' : '';
            var self = this;
            var allChecked = this.sites.length > 0 && this.sites.every(function (s, i) { return !self.matchFilter(s) || self.selectedSites[i]; });
            var body =
                '<div class="jsfw-topbar">' +
                    '<div class="jsfw-heading"><h3 class="jsfw-title">站点 JS 挑战</h3><div class="jsfw-subtitle">' + visible + ' / ' + this.sites.length + ' 个网站</div></div>' +
                    '<div class="jsfw-actions">' +
                        '<label><input type="checkbox" id="jsfw-select-all" onchange="bt_js_challenge.toggleSelectAll(this)">全选</label>' +
                        '<input class="jsfw-search" type="text" placeholder="搜索..." value="' + htmlEscape(this.filterText) + '" oninput="bt_js_challenge.onSearchInput(this)">' +
                        '<select class="jsfw-filter" onchange="bt_js_challenge.setFilterStatus(this.value)">' +
                            '<option value="all"' + this.selectedFilter('all') + '>全部</option>' +
                            '<option value="enabled"' + this.selectedFilter('enabled') + '>已启用</option>' +
                            '<option value="disabled"' + this.selectedFilter('disabled') + '>未启用</option>' +
                            '<option value="unsupported"' + this.selectedFilter('unsupported') + '>不支持</option>' +
                        '</select>' +
                        '<button class="btn btn-default btn-sm" onclick="bt_js_challenge.getSites()">刷新</button>' +
                        '<button class="btn btn-default btn-sm" onclick="bt_js_challenge.exportConfig()">导出</button>' +
                        '<button class="btn btn-default btn-sm" onclick="bt_js_challenge.showImport()">导入</button>' +
                    '</div>' +
                '</div>' +
                '<div class="jsfw-batch-bar' + batchClass + '">' +
                    '<span class="jsfw-batch-count">已选 ' + batchCount + ' 个站点</span>' +
                    '<button class="btn btn-success btn-xs" onclick="bt_js_challenge.batchEnable()">批量启用</button>' +
                    '<button class="btn btn-danger btn-xs" onclick="bt_js_challenge.batchDisable()">批量关闭</button>' +
                    '<button class="btn btn-default btn-xs" onclick="bt_js_challenge.clearSelection()">取消</button>' +
                '</div>' +
                '<div class="jsfw-stats">' +
                    this.renderStat('全部', stats.total, '', '共 ' + stats.total + ' 个站点') +
                    this.renderStat('已保护', stats.enabled, 'active', stats.enabled + ' 个已启用') +
                    this.renderStat('待启用', stats.disabled, '', stats.disabled + ' 个未配置') +
                    this.renderStat('不兼容', stats.unsupported, 'warn', stats.unsupported + ' 个需处理') +
                '</div>' +
                '<div class="jsfw-site-list">' + list + '</div>' +
                '<div id="jsfw-import-area" style="display:none;"></div>';
            $('.plugin_body').html(body);
            if (allChecked) { $('#jsfw-select-all').prop('checked', true); $('#jsfw-select-all').prop('indeterminate', false); }
            else if (batchCount > 0) { $('#jsfw-select-all').prop('checked', false); $('#jsfw-select-all').prop('indeterminate', true); }
        },

        renderSiteItem: function (item, index) {
            var setting = item.setting || {};
            var enabled = !!setting.enabled;
            var checked = enabled ? ' checked="checked"' : '';
            var disabledAttr = item.supported ? '' : ' disabled="disabled"';
            var typeTitle = this.typeTitle(setting.challenge_type || 'cookie_delay');
            var stateClass = 'jsfw-site has-check';
            if (enabled) stateClass += ' is-active';
            if (this.selectedSites[index]) stateClass += ' is-selected';
            if (!item.supported) stateClass += ' is-unsupported';
            var statusCls = 'jsfw-pill', statusText = '未启用';
            if (enabled && item.active) { statusCls += ' ok'; statusText = '正常'; }
            if (enabled && !item.active) { statusCls += ' warn'; statusText = '未生效'; }
            if (!item.supported) { statusCls += ' warn'; statusText = '不支持'; }
            var checkedStr = this.selectedSites[index] ? ' checked="checked"' : '';
            return '<div class="' + stateClass + '" data-index="' + index + '">' +
                '<input class="jsfw-site-check" type="checkbox"' + checkedStr + ' onchange="bt_js_challenge.toggleSiteSelect(' + index + ', this)" onclick="event.stopPropagation();">' +
                '<div class="jsfw-site-head">' +
                '<div class="jsfw-site-head-left">' +
                    '<span class="jsfw-site-name" title="' + htmlEscape(item.name) + '">' + htmlEscape(item.name) + '</span>' +
                    '<span class="jsfw-site-path" title="' + htmlEscape(item.path || '') + '">' + htmlEscape(item.path || '无路径') + '</span>' +
                    '<div class="jsfw-site-meta">' +
                        '<span class="' + statusCls + '">' + statusText + '</span>' +
                        '<span class="jsfw-pill">' + htmlEscape(typeTitle) + '</span>' +
                        '<span class="jsfw-pill">' + htmlEscape(setting.cookie_ttl || 3600) + 's</span>' +
                    '</div>' +
                '</div>' +
                '<div class="jsfw-head-actions">' +
                    '<label class="jsfw-switch"><input class="jsfw-enabled" type="checkbox"' + checked + disabledAttr + '><span class="jsfw-slider"></span><span>JS挑战</span></label>' +
                    '<button class="btn btn-success btn-xs" id="jsfw-btn-' + index + '" onclick="bt_js_challenge.saveSite(' + index + ', this)"' + disabledAttr + '>保存</button>' +
                    '<button class="btn btn-default btn-xs" onclick="bt_js_challenge.disableSite(' + index + ')"' + disabledAttr + '>关闭</button>' +
                '</div></div>' +
                '<div class="jsfw-site-body">' +
                    '<div class="jsfw-site-section">' +
                        '<div class="jsfw-section-title"><span class="jsfw-section-dot"></span><span>防护配置</span></div>' +
                        '<div class="jsfw-grid">' +
                            this.renderSelectField('挑战类型', 'jsfw-type', this.renderTypeOptions(setting.challenge_type || 'cookie_delay'), 'C', disabledAttr) +
                            this.renderNumberField('有效期', 'jsfw-ttl', setting.cookie_ttl || 3600, 60, 86400, '秒', 'T', disabledAttr) +
                            this.renderNumberField('延迟', 'jsfw-delay', setting.challenge_delay || 600, 0, 5000, 'ms', 'D', disabledAttr) +
                            this.renderNumberField('PoW难度', 'jsfw-pow', setting.pow_difficulty || 3, 1, 5, '', 'P', disabledAttr) +
                        '</div>' +
                    '</div>' +
                    '<div class="jsfw-site-section">' +
                        '<div class="jsfw-section-title"><span class="jsfw-section-dot"></span><span>自定义内容</span></div>' +
                        '<div class="jsfw-grid">' +
                            this.renderTextInput('页面标题', 'jsfw-title', setting.challenge_title || '星辰云IDC安全验证', 40, 'H', disabledAttr) +
                            this.renderTextInput('提示文案', 'jsfw-text', setting.challenge_text || '正在检查你的浏览器安全性...', 120, 'M', disabledAttr) +
                            this.renderTextInput('放行后缀', 'jsfw-ext', setting.exclude_ext || '', 180, 'E', disabledAttr, 'wide') +
                        '</div>' +
                    '</div>' +
                    '<div class="jsfw-site-section">' +
                        '<div class="jsfw-ip-section">' +
                            '<div class="jsfw-label"><span class="jsfw-label-icon">W</span>IP 白名单</div>' +
                            '<textarea class="jsfw-textarea jsfw-whitelist" maxlength="1000" placeholder="每行一个IP地址，支持CIDR格式&#10;例如：&#10;10.0.0.1&#10;172.16.0.0/12"' + disabledAttr + '>' + htmlEscape((setting.ip_whitelist || []).join('\n')) + '</textarea>' +
                            '<div class="jsfw-ip-hint">白名单IP将跳过JS挑战，直接放行</div>' +
                    '</div>' +
                '</div></div></div>';
        },

        renderStat: function (label, value, cls, sub) { return '<div class="jsfw-stat ' + cls + '"><div class="jsfw-stat-top"><span class="jsfw-stat-dot"></span><span class="jsfw-stat-label">' + label + '</span></div><span class="jsfw-stat-value">' + value + '</span>' + (sub ? '<span class="jsfw-stat-sub">' + sub + '</span>' : '') + '</div>'; },
        renderSelectField: function (label, cls, options, icon, disabled) { return '<label class="jsfw-field"><span class="jsfw-label">' + (icon ? '<span class="jsfw-label-icon">' + icon + '</span>' : '') + label + '</span><select class="bt-input-text jsfw-control ' + cls + '"' + disabled + '>' + options + '</select></label>'; },
        renderNumberField: function (label, cls, value, min, max, unit, icon, disabled) { var u = unit ? '<span class="jsfw-unit">' + unit + '</span>' : ''; return '<label class="jsfw-field"><span class="jsfw-label">' + (icon ? '<span class="jsfw-label-icon">' + icon + '</span>' : '') + label + '</span><span class="jsfw-inline-unit"><input class="bt-input-text jsfw-control ' + cls + '" type="number" min="' + min + '" max="' + max + '" value="' + htmlEscape(value) + '"' + disabled + '>' + u + '</span></label>'; },
        renderTextInput: function (label, cls, value, maxlength, icon, disabled, extraClass) { return '<label class="jsfw-field ' + (extraClass || '') + '"><span class="jsfw-label">' + (icon ? '<span class="jsfw-label-icon">' + icon + '</span>' : '') + label + '</span><input class="bt-input-text jsfw-control ' + cls + '" type="text" maxlength="' + maxlength + '" value="' + htmlEscape(value) + '"' + disabled + '></label>'; },
        renderTypeOptions: function (value) { var h = ''; for (var i = 0; i < this.challengeTypes.length; i++) { var t = this.challengeTypes[i]; h += '<option value="' + htmlEscape(t.value) + '"' + (t.value === value ? ' selected="selected"' : '') + '>' + htmlEscape(t.title) + '</option>'; } return h; },
        typeTitle: function (value) { for (var i = 0; i < this.challengeTypes.length; i++) { if (this.challengeTypes[i].value === value) return this.challengeTypes[i].title; } return 'Cookie延时'; },

        getStats: function () {
            var s = { total: this.sites.length, enabled: 0, disabled: 0, unsupported: 0 };
            for (var i = 0; i < this.sites.length; i++) {
                var it = this.sites[i];
                if (!it.supported) s.unsupported++;
                else if (it.setting && it.setting.enabled) s.enabled++;
                else s.disabled++;
            }
            return s;
        },
        matchFilter: function (item) {
            var t = this.filterText.toLowerCase();
            if (t) { var h = String(item.name || '').toLowerCase() + ' ' + String(item.path || '').toLowerCase(); if (h.indexOf(t) === -1) return false; }
            if (this.filterStatus === 'enabled') return !!(item.supported && item.setting && item.setting.enabled);
            if (this.filterStatus === 'disabled') return !!(item.supported && !(item.setting && item.setting.enabled));
            if (this.filterStatus === 'unsupported') return !item.supported;
            return true;
        },
        onSearchInput: function (el) { this.filterText = el.value || ''; var self = this; if (this._st) clearTimeout(this._st); this._st = setTimeout(function () { self.renderSites(); }, 280); },
        setFilterStatus: function (v) { this.filterStatus = v || 'all'; this.renderSites(); },
        selectedFilter: function (v) { return this.filterStatus === v ? ' selected="selected"' : ''; },
        toggleSelectAll: function (el) { this.selectedSites = {}; if (el.checked) { for (var i = 0; i < this.sites.length; i++) { if (!this.matchFilter(this.sites[i]) || !this.sites[i].supported) continue; this.selectedSites[i] = true; } } this.renderSites(); },
        toggleSiteSelect: function (index, el) { if (el.checked) this.selectedSites[index] = true; else delete this.selectedSites[index]; this.renderSites(); },
        clearSelection: function () { this.selectedSites = {}; this.renderSites(); },
        getSelectedSiteNames: function () { var n = []; for (var i in this.selectedSites) { if (this.selectedSites.hasOwnProperty(i) && this.sites[i]) n.push(this.sites[i].name); } return n; },

        saveSite: function (index, btnEl) {
            var row = $('.jsfw-site[data-index="' + index + '"]');
            var item = this.sites[index];
            var args = {
                site_name: item.name,
                enabled: row.find('.jsfw-enabled').is(':checked') ? 1 : 0,
                challenge_type: row.find('.jsfw-type').val(),
                cookie_ttl: row.find('.jsfw-ttl').val(),
                challenge_delay: row.find('.jsfw-delay').val(),
                pow_difficulty: row.find('.jsfw-pow').val(),
                challenge_title: row.find('.jsfw-title').val(),
                challenge_text: row.find('.jsfw-text').val(),
                exclude_ext: row.find('.jsfw-ext').val(),
                ip_whitelist: row.find('.jsfw-whitelist').val()
            };
            if (btnEl) setButtonLoading(btnEl, true);
            var self = this;
            requestPlugin('xcy_safe', 'save_site', args, function (rdata) {
                if (btnEl) setButtonLoading(btnEl, false);
                layer.msg(rdata.msg || (rdata.status ? '保存成功' : '保存失败'), { icon: rdata.status ? 1 : 2 });
                self.getSites();
            }, 120000);
        },
        disableSite: function (index) {
            var self = this, item = this.sites[index];
            layer.confirm('确定关闭站点 <strong>' + htmlEscape(item.name) + '</strong> 的 JS 挑战？', { title: '关闭 JS 挑战', icon: 3, btn: ['确定关闭', '取消'] }, function (li) { layer.close(li); $('.jsfw-site[data-index="' + index + '"]').find('.jsfw-enabled').prop('checked', false); self.saveSite(index); });
        },
        batchEnable: function () {
            var names = this.getSelectedSiteNames();
            if (names.length === 0) { layer.msg('请先选择站点', { icon: 0 }); return; }
            var self = this;
            layer.confirm('确定对 ' + names.length + ' 个站点<strong>批量启用</strong> JS 挑战？', { title: '批量启用', icon: 3, btn: ['确定', '取消'] }, function (li) { layer.close(li); requestPlugin('xcy_safe', 'batch_enable_sites', { site_names: names.join(',') }, function (rdata) { layer.msg(rdata.msg || '批量操作完成', { icon: rdata.status ? 1 : 2 }); self.getSites(); }, 180000); });
        },
        batchDisable: function () {
            var names = this.getSelectedSiteNames();
            if (names.length === 0) { layer.msg('请先选择站点', { icon: 0 }); return; }
            var self = this;
            layer.confirm('确定对 ' + names.length + ' 个站点<strong>批量关闭</strong> JS 挑战？此操作不可恢复！', { title: '批量关闭', icon: 3, btn: ['确定关闭', '取消'] }, function (li) { layer.close(li); requestPlugin('xcy_safe', 'batch_disable_sites', { site_names: names.join(',') }, function (rdata) { layer.msg(rdata.msg || '批量操作完成', { icon: rdata.status ? 1 : 2 }); self.getSites(); }, 180000); });
        },
        exportConfig: function () {
            var self = this;
            requestPlugin('xcy_safe', 'export_config', {}, function (rdata) {
                if (!rdata.status || !rdata.data) { layer.msg(rdata.msg || '导出失败', { icon: 2 }); return; }
                var blob = new Blob([rdata.data], { type: 'application/json' });
                var url = URL.createObjectURL(blob);
                var a = document.createElement('a');
                a.href = url; a.download = 'js-challenge-config-' + new Date().toISOString().slice(0, 10) + '.json';
                document.body.appendChild(a); a.click(); document.body.removeChild(a); URL.revokeObjectURL(url);
                layer.msg('配置已导出', { icon: 1 });
            });
        },
        showImport: function () {
            if ($('#jsfw-import-area').is(':visible')) { $('#jsfw-import-area').hide(); return; }
            $('#jsfw-import-area').html('<div class="jsfw-import-area"><div class="jsfw-import-area-title"><span class="jsfw-section-dot"></span>批量导入配置</div><textarea id="jsfw-import-data" placeholder=\'{"xcyidc.com":{"enabled":true,"challenge_type":"cookie_delay",...}}\'></textarea><div style="margin-top:14px;display:flex;align-items:center;gap:8px;"><button class="btn btn-success btn-xs" onclick="bt_js_challenge.doImport()">确认导入</button><button class="btn btn-default btn-xs" onclick="bt_js_challenge.hideImport()">取消</button><span style="font-size:11px;color:#94a3b8;">导入将合并到现有配置</span></div></div>').show();
        },
        hideImport: function () { $('#jsfw-import-area').hide(); },
        doImport: function () {
            var data = $('#jsfw-import-data').val().trim();
            if (!data) { layer.msg('请输入配置数据', { icon: 0 }); return; }
            var self = this;
            layer.confirm('确定导入配置？将会合并到现有站点配置中。', { title: '导入配置', icon: 3, btn: ['确认导入', '取消'] }, function (li) { layer.close(li); requestPlugin('xcy_safe', 'import_config', { data: data }, function (rdata) { layer.msg(rdata.msg || (rdata.status ? '导入成功' : '导入失败'), { icon: rdata.status ? 1 : 2 }); if (rdata.status) { self.hideImport(); self.getSites(); } }); });
        },

        getChallengeLogs: function (p) {
            if (p === undefined) p = 1;
            var self = this;
            requestPlugin('xcy_safe', 'get_challenge_logs', { p: p, rows: 15, callback: 'bt_js_challenge.getChallengeLogs' }, function (rdata) {
                if (!rdata.status) { layer.msg(rdata.msg || '读取挑战日志失败', { icon: 2 }); return; }
                var rows = '';
                for (var i = 0; i < rdata.data.length; i++) { var it = rdata.data[i]; var sc = it.status === '通过' ? 'jsfw-pill ok' : 'jsfw-pill warn'; rows += '<tr><td width="170">' + htmlEscape(it.time || '') + '</td><td width="130">' + htmlEscape(it.ip || '') + '</td><td width="160">' + htmlEscape(it.site || '') + '</td><td width="120">' + htmlEscape(it.type || '') + '</td><td width="80"><span class="' + sc + '">' + htmlEscape(it.status || '') + '</span></td><td width="70">' + htmlEscape(it.count || 1) + '</td><td><span class="jsfw-log-detail" title="' + htmlEscape(it.ua || '') + '">' + htmlEscape(it.ua || '') + '</span></td></tr>'; }
                if (!rows) rows = '<tr class="jsfw-empty-row"><td colspan="7"><div class="jsfw-empty-icon"></div>暂无挑战日志</td></tr>';
                $('.plugin_body').html('<div class="jsfw-topbar"><div class="jsfw-heading"><h3 class="jsfw-title">挑战日志</h3><div class="jsfw-subtitle">共 ' + (rdata.count || 0) + ' 条记录</div></div><div class="jsfw-actions"><button class="btn btn-default btn-sm" onclick="bt_js_challenge.getChallengeLogs()">刷新</button><button class="btn btn-danger btn-sm" onclick="bt_js_challenge.clearChallengeLogs()">清空日志</button></div></div><div class="jsfw-log-wrap"><table class="table"><thead><tr><th width="170">时间</th><th width="130">IP</th><th width="160">域名</th><th width="120">类型</th><th width="80">状态</th><th width="70">次数</th><th>UA</th></tr></thead><tbody>' + rows + '</tbody></table></div><div class="page">' + (rdata.page || '') + '</div>');
            });
        },
        clearChallengeLogs: function () { var self = this; layer.confirm('确定清空所有挑战日志？', { title: '清空日志', icon: 3, btn: ['确定', '取消'] }, function (li) { layer.close(li); requestPlugin('xcy_safe', 'clear_challenge_logs', {}, function (rdata) { layer.msg(rdata.msg || (rdata.status ? '已清空' : '清空失败'), { icon: rdata.status ? 1 : 2 }); self.getChallengeLogs(); }); }); },
        getLogs: function (p) {
            if (p === undefined) p = 1;
            var self = this;
            requestPlugin('xcy_safe', 'get_logs', { p: p, rows: 12, callback: 'bt_js_challenge.getLogs' }, function (rdata) {
                if (!rdata.status) { layer.msg(rdata.msg || '读取日志失败', { icon: 2 }); return; }
                var rows = '';
                for (var i = 0; i < rdata.data.length; i++) { var it = rdata.data[i]; rows += '<tr><td width="160">' + htmlEscape(it.time || '') + '</td><td width="80">' + htmlEscape(it.action || '') + '</td><td width="180">' + htmlEscape(it.site || '') + '</td><td><span class="jsfw-log-detail" title="' + htmlEscape(it.detail || '') + '">' + htmlEscape(it.detail || '') + '</span></td></tr>'; }
                if (!rows) rows = '<tr class="jsfw-empty-row"><td colspan="4"><div class="jsfw-empty-icon"></div>暂无操作日志</td></tr>';
                $('.plugin_body').html('<div class="jsfw-topbar"><div class="jsfw-heading"><h3 class="jsfw-title">操作日志</h3><div class="jsfw-subtitle">共 ' + (rdata.count || 0) + ' 条记录</div></div><div class="jsfw-actions"><button class="btn btn-default btn-sm" onclick="bt_js_challenge.getLogs()">刷新</button><button class="btn btn-danger btn-sm" onclick="bt_js_challenge.clearLogs()">清空日志</button></div></div><div class="jsfw-log-wrap"><table class="table"><thead><tr><th width="160">时间</th><th width="80">操作</th><th width="180">网站</th><th>详情</th></tr></thead><tbody>' + rows + '</tbody></table></div><div class="page">' + (rdata.page || '') + '</div>');
            });
        },
        clearLogs: function () { var self = this; layer.confirm('确定清空所有操作日志？', { title: '清空日志', icon: 3, btn: ['确定', '取消'] }, function (li) { layer.close(li); requestPlugin('xcy_safe', 'clear_logs', {}, function (rdata) { layer.msg(rdata.msg || (rdata.status ? '已清空' : '清空失败'), { icon: rdata.status ? 1 : 2 }); self.getLogs(); }); }); }
    };

    $(function () {
        $('.layui-layer-page').css({ 'width': '1180px' });
        $('.bt-w-menu p').click(function () { $(this).addClass('bgw').siblings().removeClass('bgw'); });
        bt_js_challenge.getSites();
    });
})();
</script>
