<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<meta name="robots" content="noindex,nofollow">
<title>{title}</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{
  font-family:-apple-system,BlinkMacSystemFont,"Segoe UI","Microsoft YaHei","PingFang SC",sans-serif;
  display:flex;align-items:center;justify-content:center;
  min-height:100vh;padding:20px;
  background:linear-gradient(135deg,#f8fafc 0%,#e2e8f0 100%);
}
.card{
  width:440px;max-width:100%;
  background:#fff;border-radius:16px;
  box-shadow:0 4px 32px rgba(15,23,42,.06),0 1px 4px rgba(15,23,42,.04);
  padding:44px 40px 36px;text-align:center;
  border:1px solid #f1f5f9;
}
.brand{
  display:inline-flex;align-items:center;gap:8px;
  font-size:12px;font-weight:700;color:#94a3b8;
  text-transform:uppercase;letter-spacing:1.2px;
  margin-bottom:32px;
}
.brand:before{content:"";width:8px;height:8px;border-radius:50%;background:#22c55e;}
.spinner{
  width:44px;height:44px;margin:0 auto 24px;
  border:3.5px solid #e2e8f0;border-top-color:#22c55e;
  border-radius:50%;animation:spin .75s linear infinite;
}
@keyframes spin{to{transform:rotate(360deg)}}
h1{font-size:20px;font-weight:700;color:#0f172a;margin-bottom:12px;letter-spacing:-.1px;}
.desc{font-size:14px;color:#64748b;line-height:1.7;margin-bottom:24px;}
.status{
  font-size:12px;color:#94a3b8;min-height:20px;
  transition:color .25s ease;
}
.status.ok{color:#22c55e;font-weight:600;}
.status.err{color:#ef4444;font-weight:600;}
.steps{
  display:flex;justify-content:center;gap:24px;margin-bottom:24px;
}
.step{
  font-size:11px;color:#cbd5e1;font-weight:600;
  position:relative;
}
.step.done{color:#22c55e;}
.step+.step:before{
  content:"";position:absolute;left:-14px;top:4px;
  width:4px;height:4px;border-radius:50%;background:#e2e8f0;
}
.footer{
  margin-top:28px;padding-top:16px;
  border-top:1px solid #f1f5f9;
  font-size:11px;color:#cbd5e1;
}
@media(max-width:480px){
  .card{padding:32px 24px 28px;border-radius:12px;}
  h1{font-size:18px}
  .desc{font-size:13px}
}
</style>
</head>
<body>
<div class="card">
  <div class="brand">XINGCHEN IDC</div>
  <div class="spinner"></div>
  <h1>{title}</h1>
  <p class="desc">{text}</p>
  <div class="steps">
    <span class="step" id="s1">读取配置</span>
    <span class="step" id="s2">采集指纹</span>
    <span class="step" id="s3">验证通过</span>
  </div>
  <div class="status" id="status">正在进行浏览器指纹验证...</div>
  <div class="footer">安全防护由星辰云IDC提供</div>
</div>
<noscript><meta http-equiv="refresh" content="2"><p style="text-align:center;padding-top:40vh;font-family:sans-serif;color:#64748b;">请启用浏览器 JavaScript 后继续访问。</p></noscript>
<script>
document.addEventListener('DOMContentLoaded',function(){
  var cookieName='{cookie_name}',token='{token}',ttl={ttl},delay={delay};
  function state(v,c){var el=document.getElementById('status');if(el){el.textContent=v||'';el.className='status'+(c?' '+c:'');}}
  function step(n){var el=document.getElementById('s'+n);if(el)el.className='step done';}
  function simpleHash(s){var h=2166136261;for(var i=0;i<s.length;i++){h^=s.charCodeAt(i);h+=(h<<1)+(h<<4)+(h<<7)+(h<<8)+(h<<24);}return("00000000"+(h>>>0).toString(16)).slice(-8);}
  function canvasSig(){
    try{
      var c=document.createElement('canvas'),x=c.getContext('2d');
      x.textBaseline='top';x.font='14px Arial';x.fillText('xcy-sec',2,2);
      return c.toDataURL();
    }catch(e){return 'no-canvas';}
  }
  function finish(v){
    var d=new Date(Date.now()+ttl*1000).toUTCString();
    document.cookie=cookieName+'='+v+'; Max-Age='+ttl+'; expires='+d+'; Path=/; SameSite=Lax';
    step(3);state('指纹验证通过，正在跳转...','ok');
    setTimeout(function(){try{location.reload();}catch(e){location.href=location.href;}},300);
  }
  state('正在进行浏览器指纹验证...');
  step(1);
  setTimeout(function(){
    step(2);
    var fp=[
      navigator.userAgent,
      navigator.language,
      navigator.platform,
      navigator.hardwareConcurrency||0,
      screen.width+'x'+screen.height,
      screen.colorDepth,
      new Date().getTimezoneOffset(),
      canvasSig()
    ].join('|');
    state('指纹采集完成，正在校验...');
    setTimeout(function(){finish(token+'.fp.'+simpleHash(fp));},200);
  },delay);
});
</script>
</body>
</html>
