<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<meta name="robots" content="noindex,nofollow">
<title>{title}</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{
  font-family:-apple-system,BlinkMacSystemFont,"Segoe UI","Microsoft YaHei","PingFang SC",sans-serif;
  display:flex;align-items:center;justify-content:center;
  min-height:100vh;padding:20px;
  background:linear-gradient(135deg,#f8fafc 0%,#e2e8f0 100%);
}
.card{
  width:440px;max-width:100%;
  background:#fff;border-radius:16px;
  box-shadow:0 4px 32px rgba(15,23,42,.06),0 1px 4px rgba(15,23,42,.04);
  padding:44px 40px 36px;text-align:center;
  border:1px solid #f1f5f9;
}
.brand{
  display:inline-flex;align-items:center;gap:8px;
  font-size:12px;font-weight:700;color:#94a3b8;
  text-transform:uppercase;letter-spacing:1.2px;
  margin-bottom:32px;
}
.brand:before{content:"";width:8px;height:8px;border-radius:50%;background:#22c55e;}
.shield{
  width:48px;height:48px;margin:0 auto 20px;
  background:#f0fdf4;border-radius:12px;
  display:flex;align-items:center;justify-content:center;
}
.shield svg{width:24px;height:24px;color:#22c55e;}
h1{font-size:20px;font-weight:700;color:#0f172a;margin-bottom:10px;letter-spacing:-.1px;}
.desc{font-size:14px;color:#64748b;line-height:1.7;margin-bottom:20px;}
.math-challenge{
  background:#f8fafc;border:1.5px solid #e2e8f0;border-radius:12px;
  padding:22px 24px;margin-bottom:16px;
}
.math-expr{
  font-size:36px;font-weight:800;color:#14532d;
  font-family:"SF Mono",Consolas,Monaco,monospace;
  letter-spacing:3px;margin-bottom:14px;display:block;
}
.math-hint{
  font-size:12px;color:#94a3b8;margin-bottom:14px;
}
.math-row{
  display:flex;justify-content:center;gap:10px;
}
.math-input{
  width:130px;height:44px;border:1.5px solid #cbd5e1;border-radius:8px;
  text-align:center;font-size:20px;font-weight:700;outline:none;
  color:#0f172a;background:#fff;
  transition:border-color .2s ease,box-shadow .2s ease;
  -moz-appearance:textfield;
}
.math-input::-webkit-outer-spin-button,
.math-input::-webkit-inner-spin-button{-webkit-appearance:none;margin:0;}
.math-input:focus{
  border-color:#22c55e;
  box-shadow:0 0 0 3px rgba(34,197,94,.1);
}
.math-btn{
  height:44px;padding:0 24px;border:none;border-radius:8px;
  background:#22c55e;color:#fff;font-size:14px;font-weight:600;
  cursor:pointer;transition:background .2s ease,box-shadow .2s ease;
  box-shadow:0 2px 6px rgba(34,197,94,.2);
}
.math-btn:hover{background:#16a34a;}
.math-btn:active{transform:scale(.98);}
.math-error{
  color:#ef4444;font-size:12px;font-weight:600;
  margin-top:10px;min-height:18px;
}
.status{
  font-size:12px;color:#94a3b8;min-height:20px;
  transition:color .25s ease;
}
.status.ok{color:#22c55e;font-weight:600;}
.footer{
  margin-top:28px;padding-top:16px;
  border-top:1px solid #f1f5f9;
  font-size:11px;color:#cbd5e1;
}
@media(max-width:480px){
  .card{padding:32px 24px 28px;border-radius:12px;}
  h1{font-size:18px}
  .desc{font-size:13px}
  .math-expr{font-size:28px}
  .math-input{width:110px}
}
</style>
</head>
<body>
<div class="card">
  <div class="brand">XINGCHEN IDC</div>
  <div class="shield">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
      <rect x="3" y="3" width="18" height="18" rx="3"/>
      <line x1="7" y1="8" x2="17" y2="8"/>
      <line x1="7" y1="12" x2="17" y2="12"/>
      <line x1="7" y1="16" x2="12" y2="16"/>
    </svg>
  </div>
  <h1>{title}</h1>
  <p class="desc">{text}</p>
  <div class="math-challenge">
    <span class="math-expr">{math_expression} = ?</span>
    <p class="math-hint">请计算上方算式的结果并填写</p>
    <form id="mathForm" autocomplete="off">
      <div class="math-row">
        <input id="mathAnswer" class="math-input" type="number" step="1" inputmode="numeric" placeholder="答案" autocomplete="off">
        <button class="math-btn" type="submit">验证</button>
      </div>
      <div id="mathError" class="math-error"></div>
    </form>
  </div>
  <div class="status" id="status">请输入计算结果</div>
  <div class="footer">安全防护由星辰云IDC提供</div>
</div>
<noscript><meta http-equiv="refresh" content="2"><p style="text-align:center;padding-top:40vh;font-family:sans-serif;color:#64748b;">请启用浏览器 JavaScript 后继续访问。</p></noscript>
<script>
document.addEventListener('DOMContentLoaded',function(){
  var cookieName='{cookie_name}',token='{token}',ttl={ttl},delay={delay};
  var correctAnswer={math_answer};
  function state(v,c){var el=document.getElementById('status');if(el){el.textContent=v||'';el.className='status'+(c?' '+c:'');}}
  function finish(v){
    var d=new Date(Date.now()+ttl*1000).toUTCString();
    document.cookie=cookieName+'='+v+'; Max-Age='+ttl+'; expires='+d+'; Path=/; SameSite=Lax';
    state('答对了，正在跳转...','ok');
    setTimeout(function(){try{location.reload();}catch(e){location.href=location.href;}},300);
  }
  var frm=document.getElementById('mathForm');
  var inp=document.getElementById('mathAnswer');
  if(frm&&inp){
    frm.onsubmit=function(e){
      e.preventDefault();
      var v=inp.value.trim();
      if(v===''){document.getElementById('mathError').textContent='请输入计算结果';return;}
      var n=parseInt(v,10);
      if(isNaN(n)){document.getElementById('mathError').textContent='请输入有效数字';return;}
      if(n===correctAnswer){
        document.getElementById('mathError').textContent='';
        finish(token+'.math.'+correctAnswer);
      }else{
        document.getElementById('mathError').textContent='答案不正确，请重新计算';
        inp.value='';
        inp.focus();
      }
    };
    if(delay>0){setTimeout(function(){inp.focus();},delay);}
    else{inp.focus();}
  }
});
</script>
</body>
</html>
